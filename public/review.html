const allVibes = [...new Set(data.flatMap(d => d.vibe_tags))].sort();
const allTypes = [...new Set(data.flatMap(d => d.type_tags))].sort();
let activeFilters = new Set();

function render() {
  const filtered = activeFilters.size === 0 ? data : data.filter(d => {
    const tags = [...d.vibe_tags, ...d.type_tags];
    return [...activeFilters].every(f => tags.includes(f));
  });
  document.getElementById('count').textContent = `Showing ${filtered.length} / ${data.length} assets`;
  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.map(d => `
    <div class="card">
      <img src="/assets/${d.rel_path}" alt="${d.name}">
      <div class="name" title="${d.name}">${d.name}</div>
      <div class="cat">${d.category}</div>
      <div class="tags">
        ${d.vibe_tags.map(t => `<span class="tag vibe">${t}</span>`).join('')}
        ${d.type_tags.map(t => `<span class="tag type">${t}</span>`).join('')}
      </div>
      <div class="scores">V: ${Object.entries(d.vibe_scores).map(([k,v]) => k+'='+v).join(' ')}</div>
    </div>
  `).join('');
}

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '<strong style="color:#cba6f7;font-size:11px">Vibes:</strong> ' +
    allVibes.map(v => `<button onclick="toggle('${v}')" class="${activeFilters.has(v)?'active':''}">${v}</button>`).join('') +
    ' <strong style="color:#89b4fa;font-size:11px;margin-left:12px">Types:</strong> ' +
    allTypes.map(t => `<button onclick="toggle('${t}')" class="${activeFilters.has(t)?'active':''}">${t}</button>`).join('');
}

function toggle(tag) {
  if (activeFilters.has(tag)) activeFilters.delete(tag); else activeFilters.add(tag);
  renderFilters();
  render();
}

renderFilters();
render();
</script>
