<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sprite Extractor</title>
<style>
body { background: #1e1e2e; color: #cdd6f4; font-family: system-ui; margin: 0; padding: 20px; }
h1 { color: #cba6f7; }
.controls { display: flex; gap: 12px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
.controls input, .controls select { background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; padding: 6px 10px; font-size: 13px; }
.controls label { font-size: 12px; color: #a6adc8; }
.btn { background: #a6e3a1; color: #1e1e2e; border: none; border-radius: 4px; padding: 8px 16px; font-size: 13px; font-weight: bold; cursor: pointer; }
.btn:hover { background: #94e2d5; }
.btn-secondary { background: #313244; color: #cdd6f4; border: 1px solid #45475a; }
.btn-secondary:hover { background: #45475a; }
.btn-danger { background: #f38ba8; color: #1e1e2e; }
.tabs { display: flex; gap: 4px; margin: 16px 0 12px; }
.tabs button { background: #313244; color: #a6adc8; border: none; border-radius: 6px 6px 0 0; padding: 8px 20px; font-size: 13px; cursor: pointer; }
.tabs button.active { background: #45475a; color: #cdd6f4; }
#canvas-container { position: relative; overflow: auto; max-height: 70vh; border: 1px solid #45475a; border-radius: 4px; background: #11111b; }
canvas { cursor: crosshair; }
.results { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 16px; }
.sprite-card { background: #313244; border-radius: 6px; padding: 6px; text-align: center; }
.sprite-card canvas { max-width: 100%; border-radius: 3px; background: #1e1e2e; }
.sprite-card .info { font-size: 9px; color: #6c7086; margin-top: 4px; }
.stats { font-size: 12px; color: #a6adc8; margin: 8px 0; }
.manual-selection { position: absolute; border: 2px dashed #a6e3a1; pointer-events: none; }
.selection-list { margin-top: 12px; }
.selection-item { background: #313244; border-radius: 6px; padding: 8px; margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
.selection-item canvas { border-radius: 3px; background: #1e1e2e; }
.selection-item input { background: #45475a; color: #cdd6f4; border: 1px solid #6c7086; border-radius: 3px; padding: 3px 8px; font-size: 12px; width: 150px; }
</style>
</head>
<body>
<h1>Sprite Extractor</h1>
<div class="controls">
  <input type="file" id="fileInput" accept="image/*" onchange="loadImage(event)">
  <select id="gridMode" onchange="updateGridMode()" style="background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:4px;padding:6px 8px;font-size:12px">
    <option value="pixels">Tile size (px)</option>
    <option value="count">Tile count</option>
  </select>
  <label id="gridLabel1">W: <input type="number" id="gridW" value="64" min="1" max="4096" style="width:60px" onchange="recalcGrid()"></label>
  <label id="gridLabel2">H: <input type="number" id="gridH" value="64" min="1" max="4096" style="width:60px" onchange="recalcGrid()"></label>
  <span id="gridInfo" style="font-size:10px;color:#6c7086"></span>
  <label>Offset X: <input type="number" id="offsetX" value="0" min="0" max="500" style="width:50px" onchange="recalcGrid()"></label>
  <label>Offset Y: <input type="number" id="offsetY" value="0" min="0" max="500" style="width:50px" onchange="recalcGrid()"></label>
  <label>Subdivide: <select id="subdivide" onchange="recalcGrid()" style="background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:4px;padding:4px 6px;font-size:12px">
    <option value="1">1×1</option>
    <option value="2">2×2</option>
    <option value="3">3×3</option>
    <option value="4">4×4</option>
  </select></label>
  <label>Similarity: <input type="range" id="similarity" min="80" max="100" value="95" style="width:100px"><span id="simVal">95%</span></label>
</div>

<div class="tabs">
  <button class="active" onclick="switchTab('grid')">Grid Cut</button>
  <button onclick="switchTab('manual')">Manual Select</button>
</div>

<div id="tab-grid">
  <div class="controls">
    <button class="btn" onclick="gridCut()">Extract Tiles</button>
    <button class="btn btn-secondary" onclick="exportAll()">Export All as ZIP</button>
    <span class="stats" id="gridStats"></span>
  </div>
  <p style="font-size:11px;color:#6c7086">Click a tile to save it. Drag across tiles to select a multi-tile sprite (e.g. 4x4). Right-click to cancel.</p>
  <div id="canvas-container" style="position:relative">
    <canvas id="gridCanvas" onmousedown="gridMouseDown(event)" onmousemove="gridMouseMove(event)" onmouseup="gridMouseUp(event)" oncontextmenu="event.preventDefault()"></canvas>
    <div id="gridHoverOverlay" style="position:absolute;border:2px solid #89b4fa;background:rgba(137,180,250,0.1);pointer-events:none;display:none"></div>
    <div id="gridSelOverlay" style="position:absolute;border:3px solid #a6e3a1;background:rgba(166,227,161,0.15);pointer-events:none;display:none"></div>
  </div>
  <div class="results" id="gridResults"></div>
  <h3 style="color:#a6e3a1;margin-top:16px" id="extractedTitle" hidden>Extracted Sprites</h3>
  <div class="selection-list" id="gridSelectionList"></div>
</div>

<div id="tab-manual" style="display:none">
  <div class="controls">
    <button class="btn btn-secondary" onclick="exportSelections()">Export Selections</button>
    <span style="font-size:11px;color:#6c7086">Click and drag on the image to select sprites</span>
  </div>
  <div id="canvas-container-manual" style="position:relative; overflow:auto; max-height:70vh; border:1px solid #45475a; border-radius:4px; background:#11111b;">
    <canvas id="manualCanvas" onmousedown="startSelect(event)" onmousemove="moveSelect(event)" onmouseup="endSelect(event)"></canvas>
    <div id="selectionOverlay"></div>
  </div>
  <div class="selection-list" id="selectionList"></div>
</div>

<script>
let img = null;
let gridTiles = [];
let manualSelections = [];
let selecting = false;
let selStart = null;

document.getElementById('similarity').oninput = (e) => {
  document.getElementById('simVal').textContent = e.target.value + '%';
};

function updateGridMode() {
  const mode = document.getElementById('gridMode').value;
  if (mode === 'count') {
    document.getElementById('gridLabel1').childNodes[0].textContent = 'Cols: ';
    document.getElementById('gridLabel2').childNodes[0].textContent = 'Rows: ';
    if (img) {
      // Convert current pixel values to tile count
      const { gw, gh } = getGridPixels();
      
      document.getElementById('gridW').value = Math.round(img.width / gw);
      document.getElementById('gridH').value = Math.round(img.height / gh);
    }
  } else {
    document.getElementById('gridLabel1').childNodes[0].textContent = 'W: ';
    document.getElementById('gridLabel2').childNodes[0].textContent = 'H: ';
    if (img) {
      const cols = parseInt(document.getElementById('gridW').value);
      const rows = parseInt(document.getElementById('gridH').value);
      document.getElementById('gridW').value = Math.round(img.width / cols);
      document.getElementById('gridH').value = Math.round(img.height / rows);
    }
  }
  recalcGrid();
}

function recalcGrid() {
  if (!img) return;
  const { gw, gh, ox, oy, sub, baseGw, baseGh } = getGridPixels();
  const mode = document.getElementById('gridMode').value;

  const cols = Math.floor((img.width - ox) / gw);
  const rows = Math.floor((img.height - oy) / gh);
  gridCols = cols; gridRows = rows;

  const baseCols = Math.floor((img.width - ox) / baseGw);
  const baseRows = Math.floor((img.height - oy) / baseGh);

  let info = '';
  if (mode === 'count') {
    info = `= ${Math.round(baseGw)}×${Math.round(baseGh)}px per tile`;
  } else {
    info = `= ${baseCols}×${baseRows} tiles`;
  }
  if (sub > 1) info += ` (${cols}×${rows} with ${sub}×${sub} subdivide)`;
  if (ox || oy) info += ` offset: ${ox},${oy}`;
  document.getElementById('gridInfo').textContent = info;

  // Redraw grid
  const canvas = document.getElementById('gridCanvas');
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  // Draw main grid (thicker)
  ctx.strokeStyle = 'rgba(166, 227, 161, 0.4)';
  ctx.lineWidth = 1.5;
  for (let r = 0; r <= baseRows; r++) {
    const y = oy + r * baseGh;
    ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + baseCols * baseGw, y); ctx.stroke();
  }
  for (let c = 0; c <= baseCols; c++) {
    const x = ox + c * baseGw;
    ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy + baseRows * baseGh); ctx.stroke();
  }

  // Draw subdivisions (thinner, dimmer)
  if (sub > 1) {
    ctx.strokeStyle = 'rgba(137, 180, 250, 0.2)';
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= rows; r++) {
      if (r % sub === 0) continue; // skip main grid lines
      const y = oy + r * gh;
      ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + cols * gw, y); ctx.stroke();
    }
    for (let c = 0; c <= cols; c++) {
      if (c % sub === 0) continue;
      const x = ox + c * gw;
      ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy + rows * gh); ctx.stroke();
    }
  }

  // Draw offset area indicator
  if (ox > 0 || oy > 0) {
    ctx.fillStyle = 'rgba(243, 139, 168, 0.1)';
    if (oy > 0) ctx.fillRect(0, 0, img.width, oy);
    if (ox > 0) ctx.fillRect(0, 0, ox, img.height);
  }
}

// Get effective grid pixel size (handles both modes, offset, subdivide)
function getGridPixels() {
  const mode = document.getElementById('gridMode').value;
  const ox = parseInt(document.getElementById('offsetX').value) || 0;
  const oy = parseInt(document.getElementById('offsetY').value) || 0;
  const sub = parseInt(document.getElementById('subdivide').value) || 1;
  let gw, gh;
  if (mode === 'count' && img) {
    const cols = parseInt(document.getElementById('gridW').value) || 1;
    const rows = parseInt(document.getElementById('gridH').value) || 1;
    gw = Math.round((img.width - ox) / cols);
    gh = Math.round((img.height - oy) / rows);
  } else {
    gw = parseInt(document.getElementById('gridW').value) || 64;
    gh = parseInt(document.getElementById('gridH').value) || 64;
  }
  // Subdivide
  return { gw: gw / sub, gh: gh / sub, ox, oy, sub, baseGw: gw, baseGh: gh };
}

// Try to parse grid size from filename
function parseGridFromName(name) {
  // Match patterns like "32x32", "64 x 64", "(128x128)"
  const match = name.match(/(\d{2,4})\s*[xX×]\s*(\d{2,4})/);
  if (match) return { w: parseInt(match[1]), h: parseInt(match[2]) };
  return null;
}

function loadImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  // Try to get grid size from filename
  const gridSize = parseGridFromName(file.name);
  if (gridSize) {
    // If numbers are small (< 200), assume it's tile count not pixel size
    if (gridSize.w < 200 && gridSize.h < 200) {
      document.getElementById('gridMode').value = 'count';
      document.getElementById('gridLabel1').childNodes[0].textContent = 'Cols: ';
      document.getElementById('gridLabel2').childNodes[0].textContent = 'Rows: ';
    }
    document.getElementById('gridW').value = gridSize.w;
    document.getElementById('gridH').value = gridSize.h;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    img = new Image();
    img.onload = () => {
      // Draw on both canvases
      const gc = document.getElementById('gridCanvas');
      gc.width = img.width; gc.height = img.height;
      gc.getContext('2d').drawImage(img, 0, 0);

      const mc = document.getElementById('manualCanvas');
      mc.width = img.width; mc.height = img.height;
      mc.getContext('2d').drawImage(img, 0, 0);

      document.getElementById('gridStats').textContent =
        `Image: ${img.width}×${img.height}px`;
      recalcGrid();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function switchTab(tab) {
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-grid').style.display = tab === 'grid' ? 'block' : 'none';
  document.getElementById('tab-manual').style.display = tab === 'manual' ? 'block' : 'none';
  event.target.classList.add('active');
}

// ============ GRID CUT ============

function getPixelData(canvas, x, y, w, h) {
  return canvas.getContext('2d').getImageData(x, y, w, h).data;
}

function tilesAreSimilar(data1, data2, threshold) {
  if (data1.length !== data2.length) return false;
  let diff = 0;
  const len = data1.length;
  // Sample every 4th pixel for speed
  for (let i = 0; i < len; i += 16) {
    diff += Math.abs(data1[i] - data2[i]);
    diff += Math.abs(data1[i+1] - data2[i+1]);
    diff += Math.abs(data1[i+2] - data2[i+2]);
  }
  const maxDiff = (len / 16) * 3 * 255;
  const similarity = 1 - (diff / maxDiff);
  return similarity >= threshold / 100;
}

function gridCut() {
  if (!img) return alert('Load an image first');
  const { gw, gh, ox, oy } = getGridPixels();

  const threshold = parseInt(document.getElementById('similarity').value);

  const canvas = document.getElementById('gridCanvas');
  const ctx = canvas.getContext('2d');

  const cols = Math.floor((img.width - ox) / gw);
  const rows = Math.floor((img.height - oy) / gh);
  const total = cols * rows;

  // Extract all tiles
  const allTiles = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const tileCanvas = document.createElement('canvas');
      tileCanvas.width = gw; tileCanvas.height = gh;
      tileCanvas.getContext('2d').drawImage(img, ox + c*gw, oy + r*gh, gw, gh, 0, 0, gw, gh);
      allTiles.push({
        canvas: tileCanvas,
        data: tileCanvas.getContext('2d').getImageData(0, 0, gw, gh).data,
        col: c, row: r,
      });
    }
  }

  // Deduplicate
  const unique = [];
  const duplicates = new Map();

  for (const tile of allTiles) {
    let found = false;
    for (let i = 0; i < unique.length; i++) {
      if (tilesAreSimilar(tile.data, unique[i].data, threshold)) {
        duplicates.set(unique[i], (duplicates.get(unique[i]) || 1) + 1);
        found = true;
        break;
      }
    }
    if (!found) unique.push(tile);
  }

  gridTiles = unique;

  // Draw grid overlay
  ctx.drawImage(img, 0, 0);
  ctx.strokeStyle = 'rgba(166, 227, 161, 0.3)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= rows; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*gh); ctx.lineTo(cols*gw, r*gh); ctx.stroke();
  }
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath(); ctx.moveTo(c*gw, 0); ctx.lineTo(c*gw, rows*gh); ctx.stroke();
  }

  document.getElementById('gridStats').textContent =
    `${cols}×${rows} = ${total} tiles → ${unique.length} unique (${threshold}% similarity)`;

  // Show results
  const results = document.getElementById('gridResults');
  results.innerHTML = '';
  unique.forEach((tile, i) => {
    const card = document.createElement('div');
    card.className = 'sprite-card';
    const c = tile.canvas.cloneNode(true);
    c.style.maxWidth = '100%';
    c.style.maxHeight = '80px';
    card.appendChild(c);
    const count = duplicates.get(tile) || 1;
    card.innerHTML += `<div class="info">tile_${i} (${gw}×${gh}) ×${count}</div>`;
    // Click to download individual
    c.style.cursor = 'pointer';
    c.onclick = () => downloadCanvas(tile.canvas, `tile_${i}.png`);
    results.appendChild(card);
  });
}

function downloadCanvas(canvas, name) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = name;
  a.click();
}

function exportAll() {
  if (gridTiles.length === 0) return alert('Extract tiles first');
  // Export each as individual download (no ZIP lib needed)
  gridTiles.forEach((tile, i) => {
    setTimeout(() => downloadCanvas(tile.canvas, `tile_${i}.png`), i * 100);
  });
}

// ============ GRID MULTI-TILE SELECT ============
let gridSelecting = false;
let gridSelStart = null;
let gridCols = 0, gridRows = 0;
let shiftSelectedCells = new Set(); // For shift-click irregular selections

function gridMouseDown(e) {
  if (!img || e.button !== 0) return;
  const { gw, gh, ox, oy } = getGridPixels();

  gridCols = Math.floor((img.width - ox) / gw);
  gridRows = Math.floor((img.height - oy) / gh);
  const rect = e.target.getBoundingClientRect();
  const mx = e.clientX - rect.left - ox;
  const my = e.clientY - rect.top - oy;
  if (mx < 0 || my < 0) return;
  const col = Math.floor(mx / gw);
  const row = Math.floor(my / gh);

  if (e.shiftKey) {
    // Shift-click: toggle individual tile in selection
    const key = `${col},${row}`;
    if (shiftSelectedCells.has(key)) {
      shiftSelectedCells.delete(key);
    } else {
      shiftSelectedCells.add(key);
    }
    drawShiftSelection(gw, gh);
    return;
  }

  // Clear shift selection on non-shift click
  shiftSelectedCells.clear();
  drawShiftSelection(gw, gh);

  gridSelStart = { col, row };
  gridSelecting = true;
}

function drawShiftSelection(gw, gh) {
  const canvas = document.getElementById('gridCanvas');
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  // Draw grid
  ctx.strokeStyle = 'rgba(166, 227, 161, 0.3)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= gridRows; r++) { ctx.beginPath(); ctx.moveTo(0, r*gh); ctx.lineTo(gridCols*gw, r*gh); ctx.stroke(); }
  for (let c = 0; c <= gridCols; c++) { ctx.beginPath(); ctx.moveTo(c*gw, 0); ctx.lineTo(c*gw, gridRows*gh); ctx.stroke(); }
  // Highlight selected cells
  const ox2 = parseInt(document.getElementById('offsetX').value) || 0;
  const oy2 = parseInt(document.getElementById('offsetY').value) || 0;
  ctx.fillStyle = 'rgba(166, 227, 161, 0.25)';
  ctx.strokeStyle = '#a6e3a1';
  ctx.lineWidth = 2;
  shiftSelectedCells.forEach(key => {
    const [c, r] = key.split(',').map(Number);
    ctx.fillRect(ox2 + c*gw, oy2 + r*gh, gw, gh);
    ctx.strokeRect(ox2 + c*gw, oy2 + r*gh, gw, gh);
  });
  // Show count
  if (shiftSelectedCells.size > 0) {
    document.getElementById('gridStats').textContent =
      `${shiftSelectedCells.size} tiles selected (Shift+click to add/remove, Enter to extract)`;
  }
}

function gridMouseMove(e) {
  const { gw, gh, ox, oy } = getGridPixels();

  const rect = e.target.getBoundingClientRect();
  const mx = e.clientX - rect.left - ox;
  const my = e.clientY - rect.top - oy;
  const hoverCol = Math.min(gridCols - 1, Math.max(0, Math.floor(mx / gw)));
  const hoverRow = Math.min(gridRows - 1, Math.max(0, Math.floor(my / gh)));

  // Hover highlight
  const hover = document.getElementById('gridHoverOverlay');
  if (hover) {
    hover.style.display = mx >= 0 && my >= 0 ? 'block' : 'none';
    hover.style.left = (ox + hoverCol * gw) + 'px';
    hover.style.top = (oy + hoverRow * gh) + 'px';
    hover.style.width = gw + 'px';
    hover.style.height = gh + 'px';
  }

  if (!gridSelecting || !gridSelStart) return;

  const col = hoverCol;
  const row = hoverRow;
  const c1 = Math.min(gridSelStart.col, col);
  const r1 = Math.min(gridSelStart.row, row);
  const c2 = Math.max(gridSelStart.col, col);
  const r2 = Math.max(gridSelStart.row, row);

  const overlay = document.getElementById('gridSelOverlay');
  overlay.style.display = 'block';
  overlay.style.left = (ox + c1 * gw) + 'px';
  overlay.style.top = (oy + r1 * gh) + 'px';
  overlay.style.width = ((c2 - c1 + 1) * gw) + 'px';
  overlay.style.height = ((r2 - r1 + 1) * gh) + 'px';
}

function gridMouseUp(e) {
  if (!gridSelecting || !gridSelStart) return;
  gridSelecting = false;
  document.getElementById('gridSelOverlay').style.display = 'none';

  const { gw, gh, ox, oy } = getGridPixels();

  const rect = e.target.getBoundingClientRect();
  const mx = e.clientX - rect.left - ox;
  const my = e.clientY - rect.top - oy;
  const col = Math.min(gridCols - 1, Math.max(0, Math.floor(mx / gw)));
  const row = Math.min(gridRows - 1, Math.max(0, Math.floor(my / gh)));

  const c1 = Math.min(gridSelStart.col, col);
  const r1 = Math.min(gridSelStart.row, row);
  const c2 = Math.max(gridSelStart.col, col);
  const r2 = Math.max(gridSelStart.row, row);

  const tw = (c2 - c1 + 1) * gw;
  const th = (r2 - r1 + 1) * gh;
  const tilesW = c2 - c1 + 1;
  const tilesH = r2 - r1 + 1;

  const tileCanvas = document.createElement('canvas');
  tileCanvas.width = Math.round(tw);
  tileCanvas.height = Math.round(th);
  tileCanvas.getContext('2d').drawImage(img, ox + c1*gw, oy + r1*gh, tw, th, 0, 0, tw, th);

  const name = `sprite_${tilesW}x${tilesH}_${manualSelections.length}`;
  manualSelections.push({ canvas: tileCanvas, x: c1*gw, y: r1*gh, w: tw, h: th, name, tilesW, tilesH });
  renderSelections();
}

// Extract shift-selected tiles on Enter
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && shiftSelectedCells.size > 0) {
    extractShiftSelection();
  }
  if (e.key === 'Escape') {
    shiftSelectedCells.clear();
    const { gw, gh } = getGridPixels();
    
    drawShiftSelection(gw, gh);
  }
});

function extractShiftSelection() {
  if (shiftSelectedCells.size === 0) return;
  const { gw, gh, ox, oy } = getGridPixels();

  // Find bounding box of selected cells
  const cells = [...shiftSelectedCells].map(k => { const [c,r] = k.split(',').map(Number); return {c,r}; });
  const minC = Math.min(...cells.map(c => c.c));
  const maxC = Math.max(...cells.map(c => c.c));
  const minR = Math.min(...cells.map(c => c.r));
  const maxR = Math.max(...cells.map(c => c.r));

  const tw = (maxC - minC + 1) * gw;
  const th = (maxR - minR + 1) * gh;

  const tileCanvas = document.createElement('canvas');
  tileCanvas.width = tw;
  tileCanvas.height = th;
  const ctx = tileCanvas.getContext('2d');

  // Only draw selected cells (transparent where not selected)
  cells.forEach(({c, r}) => {
    ctx.drawImage(img, ox + c*gw, oy + r*gh, gw, gh, (c-minC)*gw, (r-minR)*gh, gw, gh);
  });

  const tilesW = maxC - minC + 1;
  const tilesH = maxR - minR + 1;
  const name = `sprite_${tilesW}x${tilesH}_${manualSelections.length}`;
  manualSelections.push({ canvas: tileCanvas, x: minC*gw, y: minR*gh, w: tw, h: th, name, tilesW, tilesH });
  renderSelections();

  // Clear selection
  shiftSelectedCells.clear();
  drawShiftSelection(gw, gh);
}

// ============ MANUAL SELECT ============

function startSelect(e) {
  if (!img) return;
  selecting = true;
  const rect = e.target.getBoundingClientRect();
  selStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function moveSelect(e) {
  if (!selecting || !selStart) return;
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const overlay = document.getElementById('selectionOverlay');
  const sx = Math.min(selStart.x, x), sy = Math.min(selStart.y, y);
  const sw = Math.abs(x - selStart.x), sh = Math.abs(y - selStart.y);

  // Show or create selection rect
  let sel = document.getElementById('activeSelection');
  if (!sel) {
    sel = document.createElement('div');
    sel.id = 'activeSelection';
    sel.className = 'manual-selection';
    overlay.appendChild(sel);
  }
  sel.style.left = sx + 'px'; sel.style.top = sy + 'px';
  sel.style.width = sw + 'px'; sel.style.height = sh + 'px';
}

function endSelect(e) {
  if (!selecting || !selStart) return;
  selecting = false;
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const sx = Math.round(Math.min(selStart.x, x));
  const sy = Math.round(Math.min(selStart.y, y));
  const sw = Math.round(Math.abs(x - selStart.x));
  const sh = Math.round(Math.abs(y - selStart.y));

  // Remove active selection indicator
  const sel = document.getElementById('activeSelection');
  if (sel) sel.remove();

  if (sw < 5 || sh < 5) return;

  // Extract the selection
  const tileCanvas = document.createElement('canvas');
  tileCanvas.width = sw; tileCanvas.height = sh;
  tileCanvas.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

  manualSelections.push({ canvas: tileCanvas, x: sx, y: sy, w: sw, h: sh, name: `sprite_${manualSelections.length}` });
  renderSelections();
}

function renderSelections() {
  // Render in both tabs
  ['selectionList', 'gridSelectionList'].forEach(listId => {
    const list = document.getElementById(listId);
    if (!list) return;
    list.innerHTML = '';
    manualSelections.forEach((sel, i) => {
      const item = document.createElement('div');
      item.className = 'selection-item';
      // Create a proper preview by drawing the canvas content
      const preview = document.createElement('canvas');
      const maxPreview = 80;
      const scale = Math.min(maxPreview / sel.w, maxPreview / sel.h, 1);
      preview.width = sel.w * scale;
      preview.height = sel.h * scale;
      preview.style.background = '#1e1e2e';
      preview.style.borderRadius = '3px';
      const pctx = preview.getContext('2d');
      pctx.drawImage(sel.canvas, 0, 0, preview.width, preview.height);
      item.appendChild(preview);

      const info = document.createElement('div');
      info.style.flex = '1';
      info.innerHTML = `
        <input value="${sel.name}" onchange="manualSelections[${i}].name=this.value"
          style="background:#45475a;color:#cdd6f4;border:1px solid #6c7086;border-radius:3px;padding:3px 8px;font-size:12px;width:150px">
        <div style="font-size:10px;color:#6c7086;margin-top:2px">${sel.w}×${sel.h}px ${sel.tilesW ? `(${sel.tilesW}×${sel.tilesH} tiles)` : ''}</div>
      `;
      item.appendChild(info);

      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn btn-secondary';
      saveBtn.style.cssText = 'font-size:11px;padding:4px 10px';
      saveBtn.textContent = 'Save';
      saveBtn.onclick = () => downloadCanvas(manualSelections[i].canvas, manualSelections[i].name + '.png');
      item.appendChild(saveBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger';
      delBtn.style.cssText = 'font-size:11px;padding:4px 10px';
      delBtn.textContent = '×';
      delBtn.onclick = () => { manualSelections.splice(i, 1); renderSelections(); };
      item.appendChild(delBtn);

      list.appendChild(item);
    });
  });

  const title = document.getElementById('extractedTitle');
  if (title) title.hidden = manualSelections.length === 0;
}

function exportSelections() {
  manualSelections.forEach((sel, i) => {
    setTimeout(() => downloadCanvas(sel.canvas, sel.name + '.png'), i * 100);
  });
}
</script>
